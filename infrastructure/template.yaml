AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31
Description: AWS CloudFormation Template for the Application

###############################################################################
Parameters:
###############################################################################
  EnvironmentName:
    Description: Environment name for the application dev/staging/production
    Type: String
    AllowedValues:
      - alwil17
      - dev
      - preprod
      - prod
  TelegramBotToken:
    Type: String
    Description: Token for Telegram Bot (from BotFather)
    NoEcho: true
  MistralApiKey:
    Type: String
    Description: API Key for Mistral AI
    NoEcho: true
  TelegramWebhookUrl:
    Type: String
    Description: URL for Telegram Webhook (will be set automatically)
    Default: ""

###############################################################################
Resources:
###############################################################################
  DynamoDBTable:
    Type: "AWS::DynamoDB::Table"
    Properties:
      TableName: !Sub "chatbot-dbtable-${EnvironmentName}"
      AttributeDefinitions:
        - AttributeName: "id"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "id"
          KeyType: "HASH"
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  Function:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "chatbot-lambda-${EnvironmentName}"
      CodeUri: ../
      Handler: src/main.handler
      Runtime: python3.12
      Environment:
        Variables:
          ENV_NAME: !Ref EnvironmentName
          AWS_REGION_NAME: !Ref AWS::Region
          DYNAMO_TABLE: !Ref DynamoDBTable
          TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
          MISTRAL_API_KEY: !Ref MistralApiKey
          TELEGRAM_WEBHOOK_URL: !Ref TelegramWebhookUrl
          TELEGRAM_WEBHOOK_PATH: "/telegram/webhook"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoDBTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !Sub "chatbot-apigateway-${EnvironmentName}"


Outputs:
  DynamoDBTableName:
    Value: !Ref DynamoDBTable
  ApiUrl:
    Description: URL of your API
    Value:
      Fn::Sub: 'https://${Api}.execute-api.${AWS::Region}.${AWS::URLSuffix}/'